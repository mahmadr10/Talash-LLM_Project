<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALASH - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="logo" style="margin-bottom: 18px;">
            <h1 style="color: #111; font-size: 2.2rem;">TALASH</h1>
            <p style="color: #6a6f79;">ANALYTICAL LEDGER</p>
        </div>
        <h2>Welcome to TALASH</h2>
        <p>Sign in to access the Recruiter Dashboard</p>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-primary">Login</button>
        </form>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
